<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All Videos — CProReview</title>
  <meta name="description" content="Watch CProReview videos, including product reviews, setup tours, buying guides, and optimization walkthroughs."/>
  <link rel="canonical" href="https://cpro-review.com/videos.html">
  <meta property="og:title" content="All Videos - CProReview">
  <meta property="og:description" content="Watch product reviews, setup tours, buying guides, and optimization walkthroughs.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cpro-review.com/videos.html">
  <meta property="og:image" content="https://cpro-review.com/assets/images/logo/dark/tile-512x512.png">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Bootstrap & site styles -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome (for footer social icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" href="assets/images/favicons/dark/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicons/dark/favicon-32x32.png" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicons/light/favicon-32x32.png" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicons/dark/favicon-16x16.png" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicons/light/favicon-16x16.png" media="(prefers-color-scheme: light)">
  <link rel="apple-touch-icon" href="assets/images/favicons/dark/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css?v=20260527163934">

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" defer></script>
  <script src="script.js?v=20260527163934" defer></script>
</head>
<body>
  <!-- Shared header include (loads header.html) -->
  <div id="header-include"></div>

  <main class="container-xxl my-5">
    <section>
      <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between mb-3">
        <h2 class="mb-2 mb-md-0">All Videos</h2>

        <div class="filter-toolbar ms-md-3" aria-label="Video controls">
          <div class="filter-control">
            <label for="videoCategoryFilter" class="text-muted small mb-0">Category</label>
            <select id="videoCategoryFilter" class="form-select form-select-sm" style="min-width: 180px;">
              <option value="all">All categories</option>
              <!-- options populated by script.js -->
            </select>
          </div>
          <div class="filter-control">
            <label for="videosSort" class="text-muted small mb-0">Sort</label>
            <select id="videosSort" class="form-select form-select-sm" style="min-width: 150px;">
              <option value="newest">Newest</option>
              <option value="oldest">Oldest</option>
              <option value="az">A-Z</option>
              <option value="za">Z-A</option>
            </select>
          </div>
        </div>
      </div>

      <div class="category-chip-row mb-4" id="videoCategoryChips"></div>
      <p class="result-count" id="videosCount" aria-live="polite"></p>

      <!-- Videos grid (thumbnails; modal player on click) -->
      <div class="row row-cols-1 row-cols-md-3 g-4" id="videosGrid"></div>
      <p id="noVideoResults" class="text-muted mt-2" style="display:none;">No videos found.</p>

      <!-- Pagination -->
      <nav class="mt-4" aria-label="Videos pagination">
        <ul class="pagination justify-content-center" id="videosPagination"></ul>
      </nav>
    </section>
  </main>

  <!-- Modal player (single instance reused by home & videos page) -->
  <div class="modal fade" id="videoPlayerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content bg-dark">
        <div class="modal-body p-0 ratio ratio-16x9">
          <iframe id="videoPlayerFrame" src="" title="Video player"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                  allowfullscreen></iframe>
        </div>
        <div class="modal-footer justify-content-between py-2 px-3">
          <span class="text-white-50 small" id="videoPlayerTitle"></span>
          <button type="button" class="btn btn-outline-primary btn-sm" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Back to top -->
  <button id="backToTop" class="btn btn-primary rounded-circle" type="button" aria-label="Back to top">↑</button>

  <!-- Shared footer include (loads footer.html) -->
  <div id="footer-include"></div>
</body>
</html>
