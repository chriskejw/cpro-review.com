<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reviews &amp; Guides - CProReview</title>
  <meta name="description" content="Browse all CProReview product reviews, tech accessories, buying guides, and optimization posts."/>
  <link rel="canonical" href="https://cpro-review.com/posts.html">
  <meta property="og:title" content="Reviews &amp; Guides - CProReview">
  <meta property="og:description" content="Browse CProReview product reviews, accessories, and practical tech guides.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cpro-review.com/posts.html">
  <meta property="og:image" content="https://cpro-review.com/assets/images/logo/dark/tile-512x512.png">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome (for footer social icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Site styles -->
  <link rel="icon" href="assets/images/favicons/dark/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicons/dark/favicon-32x32.png" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicons/light/favicon-32x32.png" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicons/dark/favicon-16x16.png" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicons/light/favicon-16x16.png" media="(prefers-color-scheme: light)">
  <link rel="apple-touch-icon" href="assets/images/favicons/dark/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css?v=20260527171714">

  <!-- Scripts (defer) -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" defer></script>
  <script src="script.js?v=20260527171714" defer></script>
</head>
<body>
  <!-- Shared header include (loads header.html via script.js) -->
  <div id="header-include"></div>

  <main class="container-xxl my-5">
    <section>
      <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between mb-3">
        <div>
          <span class="eyebrow">Reviews &amp; Guides</span>
          <h2 class="mb-2 mb-md-0">Find the right advice faster</h2>
        </div>

        <div class="filter-toolbar ms-md-3" aria-label="Reviews and guides controls">
          <div class="filter-control">
            <label for="categoryFilter" class="text-muted small mb-0">Category</label>
            <select id="categoryFilter" class="form-select form-select-sm" style="min-width: 180px;">
              <option value="all">All categories</option>
              <!-- options populated by script.js -->
            </select>
          </div>
          <div class="filter-control">
            <label for="postsSort" class="text-muted small mb-0">Sort</label>
            <select id="postsSort" class="form-select form-select-sm" style="min-width: 150px;">
              <option value="newest">Newest</option>
              <option value="oldest">Oldest</option>
              <option value="az">A-Z</option>
              <option value="za">Z-A</option>
            </select>
          </div>
        </div>
      </div>

      <div class="category-chip-row mb-4" id="postCategoryChips"></div>
      <p class="result-count" id="postsCount" aria-live="polite"></p>

      <!-- Cards grid (populated by script.js from posts.json) -->
      <div class="row row-cols-1 row-cols-md-3 g-4 card-grid" id="postsGrid"></div>
      <p id="noResults" class="text-muted mt-2" style="display:none;">No reviews or guides found.</p>

      <!-- Pagination (populated by script.js) -->
      <nav class="mt-4" aria-label="Reviews and guides pagination">
        <ul class="pagination justify-content-center" id="postsPagination"></ul>
      </nav>
    </section>
  </main>

  <!-- Back to top -->
  <button id="backToTop" class="btn btn-primary rounded-circle" type="button" aria-label="Back to top">&uarr;</button>

  <!-- Shared footer include (loads footer.html via script.js) -->
  <div id="footer-include"></div>
</body>
</html>
