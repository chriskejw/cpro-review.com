<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search - CProReview</title>
  <meta name="description" content="Search CProReview reviews, guides, accessories, and videos."/>
  <meta name="robots" content="noindex,follow">
  <link rel="canonical" href="https://cpro-review.com/search.html">
  <meta property="og:title" content="Search CProReview">
  <meta property="og:description" content="Search CProReview reviews, guides, accessories, and videos.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cpro-review.com/search.html">
  <meta property="og:image" content="https://cpro-review.com/assets/images/logo/dark/tile-512x512.png">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Site styles -->
  <link rel="icon" href="assets/images/favicons/dark/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicons/dark/favicon-32x32.png" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicons/light/favicon-32x32.png" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicons/dark/favicon-16x16.png" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicons/light/favicon-16x16.png" media="(prefers-color-scheme: light)">
  <link rel="apple-touch-icon" href="assets/images/favicons/dark/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css?v=20260527171714">

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" defer></script>
  <script src="script.js?v=20260527171714" defer></script>
</head>
<body>
  <div id="header-include"></div>

  <main class="container-xxl my-5 search-page">
    <section class="search-hero">
      <span class="eyebrow">Search</span>
      <h1>Find reviews, guides, and videos.</h1>
      <div class="d-flex flex-column flex-md-row align-items-md-end justify-content-between gap-3">
        <p class="text-muted mb-0" id="searchSummary">Use the search bar above to look across CProReview.</p>
        <div class="filter-toolbar search-sort-toolbar" aria-label="Search controls">
          <div class="filter-control">
          <label for="searchSort" class="text-muted small mb-0">Sort</label>
          <select id="searchSort" class="form-select form-select-sm" style="min-width: 150px;">
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
            <option value="az">A-Z</option>
            <option value="za">Z-A</option>
          </select>
          </div>
        </div>
      </div>
    </section>

    <p id="searchNoResults" class="text-muted search-empty" style="display:none;">No results found. Try a product type, category, or topic.</p>

    <section class="search-result-section" id="searchPostsSection">
      <div class="section-heading">
        <div>
          <span class="eyebrow">Reviews &amp; Guides</span>
          <h2>Article results</h2>
        </div>
        <a href="posts.html" class="section-link">Browse all <span aria-hidden="true">&rarr;</span></a>
      </div>
      <div class="row row-cols-1 row-cols-md-3 g-4 card-grid" id="searchPostsGrid"></div>
    </section>

    <section class="search-result-section" id="searchVideosSection">
      <div class="section-heading">
        <div>
          <span class="eyebrow">Videos</span>
          <h2>Video results</h2>
        </div>
        <a href="videos.html" class="section-link">Browse all <span aria-hidden="true">&rarr;</span></a>
      </div>
      <div class="row row-cols-1 row-cols-md-3 g-4" id="searchVideosGrid"></div>
    </section>
  </main>

  <div class="modal fade" id="videoPlayerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content bg-dark">
        <div class="modal-body p-0 ratio ratio-16x9">
          <iframe id="videoPlayerFrame" src="" title="Video player"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                  allowfullscreen></iframe>
        </div>
        <div class="modal-footer justify-content-between py-2 px-3">
          <span class="text-white-50 small" id="videoPlayerTitle"></span>
          <button type="button" class="btn btn-outline-primary btn-sm" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <button id="backToTop" class="btn btn-primary rounded-circle" type="button" aria-label="Back to top">&uarr;</button>
  <div id="footer-include"></div>
</body>
</html>
